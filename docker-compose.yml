version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: wsinspect-db
    environment:
      POSTGRES_USER: wsinspect
      POSTGRES_PASSWORD: wsinspect_password
      POSTGRES_DB: wsinspect_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wsinspect -d wsinspect_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Backend API Server
  wsinspect:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: wsinspect-api
    ports:
      - "8080:8080"
    environment:
      - DATABASE_URL=postgres://wsinspect:wsinspect_password@postgres:5432/wsinspect_db?sslmode=disable
      - SERVER_PORT=8080
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  # Frontend
  wsinspect-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: wsinspect-web
    ports:
      - "5173:80"
    environment:
      - VITE_API_URL=http://localhost:8080
    depends_on:
      - wsinspect
    restart: unless-stopped

volumes:
  postgres_data:
