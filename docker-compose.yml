version: '3.8'

services:
  wsinspect:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - DATABASE_PATH=/data/wsinspect.db
      - SERVER_PORT=8080
    volumes:
      - wsinspect-data:/data
    restart: unless-stopped

  wsinspect-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:8080
    depends_on:
      - wsinspect

volumes:
  wsinspect-data:
