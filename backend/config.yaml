server:
  port: "8080"
  host: "0.0.0.0"

database:
  # For local development, use individual settings
  # For Docker, use DATABASE_URL environment variable
  type: postgres
  host: localhost
  port: 5432
  user: wsinspect
  password: wsinspect_password
  name: wsinspect_db
  sslmode: disable

  # Connection pool settings (production-grade)
  max_open_conns: 25
  max_idle_conns: 10
  conn_max_lifetime: 300 # seconds
  conn_max_idle_time: 60 # seconds

proxy:
  target: "ws://localhost:3000"
  buffer_size: 8192

session:
  retention_days: 30

log:
  level: info
