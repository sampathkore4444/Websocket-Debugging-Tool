server:
  host: 0.0.0.0
  port: 8080

database:
  type: sqlite
  path: ./wsinspect.db

proxy:
  target: ws://localhost:3000
  buffer_size: 8192
  timeout: 30s

session:
  retention_days: 30

log:
  level: info
  format: json
  output: stdout

cors:
  enabled: true
  allowed_origins:
    - http://localhost:5173
    - http://localhost:3000
  allowed_methods:
    - GET
    - POST
    - PUT
    - DELETE
  allowed_headers:
    - Content-Type
    - Authorization

rate_limit:
  enabled: true
  requests_per_minute: 100
